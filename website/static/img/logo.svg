<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44" width="40" height="44" fill="none">
  <defs>
    <linearGradient id="matcha" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fe5a3"/>
      <stop offset="1" stop-color="#1f7a3d"/>
    </linearGradient>
    <radialGradient id="glow" cx="20" cy="14" r="11" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fd089" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5fd089" stop-opacity="0"/>
    </radialGradient>
    <style>
      .steam {
        opacity: 0;
        transform-origin: center bottom;
        animation: steam-rise 4s ease-out infinite;
      }
      .steam-2 { animation-delay: 1.3s; }
      .steam-3 { animation-delay: 2.6s; }

      @keyframes steam-rise {
        0%   { opacity: 0; transform: translate(0, 0) scaleX(1); }
        20%  { opacity: 0.55; }
        60%  { opacity: 0.35; transform: translate(-1px, -7px) scaleX(0.85); }
        100% { opacity: 0; transform: translate(1px, -14px) scaleX(0.7); }
      }

      .ball {
        transform-origin: 20px 14px;
        animation: breathe 3.6s ease-in-out infinite;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }

      .ball-glow {
        transform-origin: 20px 14px;
        animation: pulse 3.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50%      { opacity: 0.9; transform: scale(1.12); }
      }
    </style>
  </defs>

  <!-- Steam wisps -->
  <g stroke="#5fd089" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path class="steam" d="M16 6 q 2 -2 0 -4 q -2 -2 0 -4"/>
    <path class="steam steam-2" d="M20 6 q 2 -2 0 -4 q -2 -2 0 -4"/>
    <path class="steam steam-3" d="M24 6 q 2 -2 0 -4 q -2 -2 0 -4"/>
  </g>

  <!-- Stick -->
  <rect x="18.5" y="26" width="3" height="14" fill="#3e5046"/>

  <!-- Mint base disc -->
  <circle cx="20" cy="30" r="7" fill="#a8e6c2"/>

  <!-- Cream middle disc -->
  <circle cx="20" cy="22" r="7" fill="#fffdf6" stroke="#d2c7a8" stroke-width="0.5"/>

  <!-- Glow halo (pulses) -->
  <circle class="ball-glow" cx="20" cy="14" r="9" fill="url(#glow)"/>

  <!-- Matcha ball (breathes) -->
  <g class="ball">
    <circle cx="20" cy="14" r="5" fill="url(#matcha)"/>
    <circle cx="18.3" cy="12.3" r="1.3" fill="rgba(255,255,255,0.55)"/>
  </g>
</svg>
