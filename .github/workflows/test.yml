name: Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Run tests and upload coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          cache-dependency-path: |
            go.sum

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: |
          go test -vet=off -v -race \
            -coverprofile=coverage.txt \
            -covermode=atomic ./...
